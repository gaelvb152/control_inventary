<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Control de Bandas</title>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #171717;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-container {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 12px;
        padding: 40px 32px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        text-align: center;
      }
      .login-container > svg {
        margin-bottom: 20px;
        color: #171717;
      }
      .login-container h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .login-container p {
        font-size: 14px;
        color: #737373;
        margin-bottom: 32px;
      }
      .form-group {
        margin-bottom: 16px;
        text-align: left;
      }
      .form-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #404040;
      }
      .form-control {
        width: 100%;
        padding: 12px;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.2s ease;
      }
      /* MEJORA: Resplandor suave al enfocar el input respetando tu color oscuro */
      .form-control:focus {
        outline: none;
        border-color: #171717;
        box-shadow: 0 0 0 3px rgba(23, 23, 23, 0.1);
      }
      .btn-submit {
        width: 100%;
        background: #171717;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      /* MEJORA: Pequeño efecto al presionar el botón */
      .btn-submit:hover {
        background: #2a2a2a;
      }
      .btn-submit:active {
        transform: scale(0.98);
      }
      .btn-submit:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .toggle-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 18px;
        background: none;
        border: none;
        color: #2563eb;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: color 0.2s;
      }
      .toggle-link:hover {
        text-decoration: underline;
        color: #1d4ed8;
      }
      
      /* MEJORA: Alertas más pulidas con animación de "sacudida" */
      .error-msg {
        color: #dc2626;
        font-size: 13px;
        margin-bottom: 15px;
        display: none; /* Se cambia a flex en JS cuando está activa */
        align-items: center;
        gap: 8px;
        text-align: left;
        background: #fef2f2;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #fca5a5;
        animation: shake 0.4s ease-in-out;
      }

      /* MEJORAS DE ANIMACIÓN */
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      /* MEJORA: Transición suave al alternar formularios */
      form {
        animation: fadeIn 0.3s ease-out;
      }
      
      .spinner {
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <svg
        width="40"
        height="40"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
      <h1>Bienvenido</h1>
      <p>Sistema de Control de Bandas</p>

      <div id="errorMsg" class="error-msg"></div>

      <form id="formLogin">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input
            type="email"
            id="logEmail"
            class="form-control"
            placeholder="tu@correo.com"
            required
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            id="logPassword"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn-submit" id="btnLog">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Iniciar Sesión
        </button>
        <button type="button" class="toggle-link" id="btnToggleReg">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
          ¿No tienes cuenta? Regístrate como Operador
        </button>
      </form>

      <form id="formRegister" style="display: none">
        <h3 style="margin-bottom: 16px; font-size: 16px; text-align: left">
          Registro de Operador
        </h3>
        <div class="form-group">
          <label class="form-label">Nombre Completo</label>
          <input
            type="text"
            id="regNombre"
            class="form-control"
            placeholder="Ej. Juan Pérez"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">Número de Empleado</label>
          <input
            type="text"
            id="regNumEmp"
            class="form-control"
            placeholder="Ej. 10452"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input
            type="email"
            id="regEmail"
            class="form-control"
            placeholder="tucorreo@empresa.com"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            id="regPassword"
            class="form-control"
            placeholder="Mínimo 6 caracteres"
            required
            minlength="6"
          />
        </div>
        <button type="submit" class="btn-submit" id="btnReg">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
          Registrarse
        </button>
        <button type="button" class="toggle-link" id="btnToggleLog">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Ya tengo cuenta. Iniciar sesión.
        </button>
      </form>
    </div>

    <script type="module">
      import {
        auth,
        db,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        ref,
        set,
        get,
        child,
      } from "./conexion.js";

      if (sessionStorage.getItem("token_rol")) {
        window.location.href = "dashboard.html";
      }

      const formLogin = document.getElementById("formLogin");
      const formRegister = document.getElementById("formRegister");
      const errorMsg = document.getElementById("errorMsg");

      // MEJORA: Se agregó un icono a la alerta para mayor impacto visual
      function showError(msg) {
        errorMsg.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span>${msg}</span>
        `;
        errorMsg.style.display = "flex";
        
        // Reinicia la animación para que se sacuda cada vez que hay un error nuevo
        errorMsg.style.animation = 'none';
        errorMsg.offsetHeight; 
        errorMsg.style.animation = null;

        setTimeout(() => (errorMsg.style.display = "none"), 6000);
      }

      document.getElementById("btnToggleReg").onclick = () => {
        formLogin.style.display = "none";
        formRegister.style.display = "block";
      };
      document.getElementById("btnToggleLog").onclick = () => {
        formLogin.style.display = "block";
        formRegister.style.display = "none";
      };

      const loadingIcon = '<svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>';

      // Lógica de Login
      formLogin.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnLog");
        const originalContent = btn.innerHTML;
        btn.disabled = true;
        // MEJORA: Animación de carga en el botón
        btn.innerHTML = `${loadingIcon} Verificando...`;

        const email = document.getElementById("logEmail").value.trim();
        const pass = document.getElementById("logPassword").value;

        try {
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            pass,
          );
          const user = userCredential.user;

          const userDoc = await get(child(ref(db), `users/${user.uid}`));

          if (userDoc.exists()) {
            const userData = userDoc.val();
            sessionStorage.setItem("token_rol", userData.rol);
            sessionStorage.setItem("user_name", userData.nombre);
            window.location.href = "dashboard.html";
          } else {
            showError("Tu usuario no tiene un rol asignado en la base de datos.");
            auth.signOut();
          }
        } catch (error) {
          if (email === "admin@empresa.com" && pass === "admin1234") {
            try {
              btn.innerHTML = `${loadingIcon} Creando Admin...`;
              const newCred = await createUserWithEmailAndPassword(
                auth,
                email,
                pass,
              );

              await set(ref(db, `users/${newCred.user.uid}`), {
                uid: newCred.user.uid,
                nombre: "Administrador Principal",
                email: email,
                rol: "admin",
                fecha_creacion: new Date().toISOString(),
              });

              sessionStorage.setItem("token_rol", "admin");
              sessionStorage.setItem("user_name", "Administrador Principal");
              window.location.href = "dashboard.html";
              return; 
            } catch (errCrear) {
              console.error(errCrear);
              showError("Hubo un error al crear el admin inicial: " + errCrear.message);
            }
          } else {
            console.error(error);
            showError("Credenciales incorrectas o el usuario no existe.");
          }
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalContent;
        }
      });

      // Lógica de Registro Operador
      formRegister.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnReg");
        const originalContent = btn.innerHTML;
        btn.disabled = true;
        // MEJORA: Animación de carga en el botón
        btn.innerHTML = `${loadingIcon} Registrando...`;

        try {
          const email = document.getElementById("regEmail").value.trim();
          const pass = document.getElementById("regPassword").value;
          const nombre = document.getElementById("regNombre").value.trim();
          const numEmp = document.getElementById("regNumEmp").value.trim();

          const userCredential = await createUserWithEmailAndPassword(
            auth,
            email,
            pass,
          );
          const user = userCredential.user;

          await set(ref(db, `users/${user.uid}`), {
            uid: user.uid,
            nombre: nombre,
            num_empleado: numEmp,
            email: email,
            rol: "operador",
            fecha_creacion: new Date().toISOString(),
          });

          alert("Registro exitoso. Iniciando sesión automáticamente...");
          sessionStorage.setItem("token_rol", "operador");
          sessionStorage.setItem("user_name", nombre);
          window.location.href = "dashboard.html";
        } catch (error) {
          console.error(error);
          if (error.code === "auth/email-already-in-use") {
            showError("Este correo ya está registrado.");
          } else if (error.code === "auth/weak-password") {
            showError("La contraseña debe tener al menos 6 caracteres.");
          } else {
            showError("Error al registrar: " + error.message);
          }
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalContent;
        }
      });
    </script>
  </body>
</html>

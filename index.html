<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Control de Bandas</title>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <style>
      :root {
        --primary: #1d4ed8;
        --primary-hover: #1e40af;
        --bg-color: #f1f5f9;
        --surface: #ffffff;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --ring: rgba(29, 78, 216, 0.2);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: var(--bg-color);
        background-image: radial-gradient(circle at 50% 0%, #e2e8f0 0%, transparent 70%);
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .login-container {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* Detalle visual en la parte superior del contenedor */
      .login-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), #60a5fa);
      }

      .header-icon {
        background: #eff6ff;
        color: var(--primary);
        width: 64px;
        height: 64px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
      }

      .login-container h1 {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      .login-container p {
        font-size: 15px;
        color: var(--text-muted);
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
        position: relative;
      }

      .form-label {
        display: block;
        font-size: 13.5px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #334155;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        pointer-events: none;
        transition: color 0.2s;
      }

      .form-control {
        width: 100%;
        padding: 12px 12px 12px 42px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text-main);
        background-color: #f8fafc;
        transition: all 0.2s ease;
      }

      .form-control::placeholder {
        color: #94a3b8;
      }

      .form-control:focus {
        outline: none;
        border-color: var(--primary);
        background-color: var(--surface);
        box-shadow: 0 0 0 4px var(--ring);
      }

      .form-control:focus + svg,
      .input-wrapper:focus-within svg {
        color: var(--primary);
      }

      .btn-submit {
        width: 100%;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 12px;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 6px -1px rgba(29, 78, 216, 0.2);
      }

      .btn-submit:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 8px -1px rgba(29, 78, 216, 0.3);
      }

      .btn-submit:active {
        transform: translateY(0);
      }

      .btn-submit:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .toggle-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 24px;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s;
        width: 100%;
      }

      .toggle-link:hover {
        color: var(--primary);
      }

      .error-msg {
        color: #b91c1c;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
        background: #fef2f2;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #fecaca;
        font-weight: 500;
        animation: shake 0.4s ease-in-out;
      }

      /* Animación suave al cambiar de formularios */
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }

      form {
        animation: fadeSlideIn 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      
      <div class="header-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
      </div>

      <h1>Bienvenido</h1>
      <p>Sistema de Control de Bandas</p>

      <div id="errorMsg" class="error-msg"></div>

      <form id="formLogin">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="logEmail"
              class="form-control"
              placeholder="tu@correo.com"
              required
              autocomplete="email"
            />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="logPassword"
              class="form-control"
              placeholder="••••••••"
              required
            />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnLog">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
          Iniciar Sesión
        </button>

        <button type="button" class="toggle-link" id="btnToggleReg">
          ¿No tienes cuenta? Regístrate como Operador
        </button>
      </form>

      <form id="formRegister" style="display: none">
        <h3 style="margin-bottom: 20px; font-size: 18px; text-align: left; color: var(--text-main);">
          Registro de Operador
        </h3>
        
        <div class="form-group">
          <label class="form-label">Nombre Completo</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="regNombre"
              class="form-control"
              placeholder="Ej. Juan Pérez"
              required
            />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Número de Empleado</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="regNumEmp"
              class="form-control"
              placeholder="Ej. 10452"
              required
            />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="regEmail"
              class="form-control"
              placeholder="tucorreo@empresa.com"
              required
            />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="regPassword"
              class="form-control"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
            />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnReg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
          Registrarse
        </button>

        <button type="button" class="toggle-link" id="btnToggleLog">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Volver a Iniciar sesión
        </button>
      </form>
    </div>

    <script type="module">
      import {
        auth,
        db,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        ref,
        set,
        get,
        child,
      } from "./conexion.js";

      if (sessionStorage.getItem("token_rol")) {
        window.location.href = "dashboard.html";
      }

      const formLogin = document.getElementById("formLogin");
      const formRegister = document.getElementById("formRegister");
      const errorMsg = document.getElementById("errorMsg");

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
        setTimeout(() => (errorMsg.style.display = "none"), 6000);
      }

      document.getElementById("btnToggleReg").onclick = () => {
        formLogin.style.display = "none";
        formRegister.style.display = "block";
      };
      document.getElementById("btnToggleLog").onclick = () => {
        formLogin.style.display = "block";
        formRegister.style.display = "none";
      };

      // Lógica de Login
      formLogin.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnLog");
        const originalContent = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML =
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Verificando...';

        const email = document.getElementById("logEmail").value.trim();
        const pass = document.getElementById("logPassword").value;

        try {
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            pass,
          );
          const user = userCredential.user;

          const userDoc = await get(child(ref(db), `users/${user.uid}`));

          if (userDoc.exists()) {
            const userData = userDoc.val();
            sessionStorage.setItem("token_rol", userData.rol);
            sessionStorage.setItem("user_name", userData.nombre);
            window.location.href = "dashboard.html";
          } else {
            showError(
              "Tu usuario no tiene un rol asignado en la base de datos.",
            );
            auth.signOut();
          }
        } catch (error) {
          if (email === "admin@empresa.com" && pass === "admin1234") {
            try {
              btn.innerHTML =
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Creando Admin Inicial...';
              const newCred = await createUserWithEmailAndPassword(
                auth,
                email,
                pass,
              );

              await set(ref(db, `users/${newCred.user.uid}`), {
                uid: newCred.user.uid,
                nombre: "Administrador Principal",
                email: email,
                rol: "admin",
                fecha_creacion: new Date().toISOString(),
              });

              sessionStorage.setItem("token_rol", "admin");
              sessionStorage.setItem("user_name", "Administrador Principal");
              window.location.href = "dashboard.html";
              return; 
            } catch (errCrear) {
              console.error(errCrear);
              showError(
                "Hubo un error al crear el admin inicial: " + errCrear.message,
              );
            }
          } else {
            console.error(error);
            showError("Credenciales incorrectas o el usuario no existe.");
          }
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalContent;
        }
      });

      // Lógica de Registro Operador
      formRegister.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnReg");
        const originalContent = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML =
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Registrando...';

        try {
          const email = document.getElementById("regEmail").value.trim();
          const pass = document.getElementById("regPassword").value;
          const nombre = document.getElementById("regNombre").value.trim();
          const numEmp = document.getElementById("regNumEmp").value.trim();

          const userCredential = await createUserWithEmailAndPassword(
            auth,
            email,
            pass,
          );
          const user = userCredential.user;

          await set(ref(db, `users/${user.uid}`), {
            uid: user.uid,
            nombre: nombre,
            num_empleado: numEmp,
            email: email,
            rol: "operador",
            fecha_creacion: new Date().toISOString(),
          });

          alert("Registro exitoso. Iniciando sesión automáticamente...");
          sessionStorage.setItem("token_rol", "operador");
          sessionStorage.setItem("user_name", nombre);
          window.location.href = "dashboard.html";
        } catch (error) {
          console.error(error);
          if (error.code === "auth/email-already-in-use") {
            showError("Este correo ya está registrado.");
          } else if (error.code === "auth/weak-password") {
            showError("La contraseña debe tener al menos 6 caracteres.");
          } else {
            showError("Error al registrar: " + error.message);
          }
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalContent;
        }
      });
    </script>
  </body>
</html>
